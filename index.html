<!DOCTYPE html>
<html lang="ckb" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>یاری عەشیرەت</title>
    <style>
        body { background: #1a1a1a; color: white; text-align: center; font-family: Tahoma, sans-serif; padding: 20px; }
        .card { background: #2c3e50; padding: 20px; border-radius: 15px; margin: 10px auto; width: 90%; max-width: 400px; }
        .castle-img { width: 100%; max-width: 250px; border-radius: 10px; }
        button { padding: 15px; margin: 5px; width: 90%; max-width: 300px; cursor: pointer; border-radius: 8px; border: none; font-weight: bold; }
        #attack-btn { background: #e74c3c; color: white; }
    </style>
</head>
<body>
    <div class="card">
        <h1>⚔️ یاری عەشیرەت</h1>
        <img src="castle.png" class="castle-img" alt="قەڵا">
        <p>🎖️ پلە: <span id="rank">سەرباز</span></p>
        <p>💰 زێڕ: <span id="gold">200</span></p>
        <p>🏰 ئاستی قەڵا: <span id="castle-level">1</span></p>
        <p>💂 سەربازەکان: <span id="soldiers">0</span></p>
    </div>

    <button id="attack-btn" onclick="launchAttack()">هێرش کردن ⚔️</button>
    <button onclick="startUpgrade()" style="background:#27ae60; color:white;">بەهێزکردن ⬆️</button>
    <button onclick="resetGame()" style="background:#7f8c8d; color:white;">سڕینەوە 🔄</button>

    <script src="game.js"></script>
</body>
</html>
